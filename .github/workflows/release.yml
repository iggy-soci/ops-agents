name: Build & Release DMG

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          BUMP_TYPE: ${{ github.event.inputs.release_type || 'patch' }}
        run: |
          CURRENT=$(node -p "require('./UI/src-tauri/tauri.conf.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('./UI/src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$NEW_VERSION';
            fs.writeFileSync('./UI/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./UI/package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./UI/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git add UI/src-tauri/tauri.conf.json UI/package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --follow-tags
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: bump-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.tag }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: UI/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "UI/src-tauri -> target"
          cache-on-failure: true

      - name: Install UI dependencies
        run: npm ci
        working-directory: UI

      - name: Install Pendo MCP dependencies
        run: npm ci
        working-directory: product-analytics-agent/mcp/pendo

      - name: Build Tauri universal DMG
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: UI
          tagName: ${{ needs.bump-version.outputs.tag }}
          releaseName: "Ops Agents ${{ needs.bump-version.outputs.tag }}"
          releaseBody: |
            ## Ops Agents ${{ needs.bump-version.outputs.tag }}
            **Commit:** ${{ github.sha }}

            ### Install
            1. Download the .dmg file below
            2. Open it and drag Ops Agents to Applications
            3. Right-click the app and select Open on first launch
            4. Make sure claude auth login has been run in your terminal
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-agents-${{ needs.bump-version.outputs.new_version }}-macos
          path: UI/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30
          if-no-files-found: warn
