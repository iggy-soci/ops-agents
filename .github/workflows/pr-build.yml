name: PR Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - "UI/**"
      - "product-analytics-agent/**"
      - "release-ops-agent/**"
      - ".github/workflows/**"

jobs:
  build-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: UI/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "UI/src-tauri -> target"

      - name: Install UI dependencies
        run: npm ci
        working-directory: UI

      - name: Install Pendo MCP dependencies
        run: npm ci
        working-directory: product-analytics-agent/mcp/pendo

      - name: Type check frontend
        run: npx tsc --noEmit
        working-directory: UI

      - name: Build Tauri arm64
        run: npm run tauri:build -- --target aarch64-apple-darwin
        working-directory: UI

      - name: Upload PR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.number }}-build
          path: UI/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7
          if-no-files-found: warn
